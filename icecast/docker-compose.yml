services:
  icecast:
    image: docker.io/moul/icecast:latest
    container_name: icecast
    restart: unless-stopped

    ports:
      - "8000:8000"

    volumes:
      - ./icecast.xml:/etc/icecast2/icecast.xml:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8000 && printf \"GET /status-json.xsl HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
